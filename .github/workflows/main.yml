name: Backend CI to Docker Hub

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

  test:
    needs: build
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  prepare:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-backend:latest

  deploy:
    needs: prepare
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, windows]  # trusted deployment only (never fork PRs)
    environment: Development
    concurrency:
      group: backend-deploy-main
      cancel-in-progress: true

    steps:
      - name: Pull latest image
        shell: powershell
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/my-backend:latest

      - name: Create .env.development file
        shell: powershell
        env:
          NODE_ENV: ${{ secrets.NODE_ENV || vars.NODE_ENV }}
          PORT: ${{ secrets.PORT || vars.PORT }}
          MONGO_HOST: ${{ secrets.MONGO_HOST || vars.MONGO_HOST }}
          MONGO_PORT: ${{ secrets.MONGO_PORT || vars.MONGO_PORT }}
          MONGO_DB: ${{ secrets.MONGO_DB || vars.MONGO_DB }}
          MONGO_AUTH_SOURCE: ${{ secrets.MONGO_AUTH_SOURCE || vars.MONGO_AUTH_SOURCE }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI || vars.GOOGLE_REDIRECT_URI }}
          FRONTEND_REDIRECT_URL: ${{ secrets.FRONTEND_REDIRECT_URL || vars.FRONTEND_REDIRECT_URL }}
          GOOGLE_AUTH_ENDPOINT: ${{ secrets.GOOGLE_AUTH_ENDPOINT || vars.GOOGLE_AUTH_ENDPOINT }}
          GOOGLE_TOKEN_ENDPOINT: ${{ secrets.GOOGLE_TOKEN_ENDPOINT || vars.GOOGLE_TOKEN_ENDPOINT }}
          GOOGLE_USERINFO_ENDPOINT: ${{ secrets.GOOGLE_USERINFO_ENDPOINT || vars.GOOGLE_USERINFO_ENDPOINT }}
        run: |
          $outputPath = Join-Path $env:RUNNER_TEMP ".env.development"
          $keys = @(
            "NODE_ENV",
            "PORT",
            "MONGO_HOST",
            "MONGO_PORT",
            "MONGO_DB",
            "MONGO_AUTH_SOURCE",
            "MONGO_URI",
            "MONGO_USERNAME",
            "MONGO_PASSWORD",
            "GOOGLE_CLIENT_ID",
            "GOOGLE_CLIENT_SECRET",
            "GOOGLE_REDIRECT_URI",
            "FRONTEND_REDIRECT_URL",
            "GOOGLE_AUTH_ENDPOINT",
            "GOOGLE_TOKEN_ENDPOINT",
            "GOOGLE_USERINFO_ENDPOINT"
          )

          $lines = New-Object System.Collections.Generic.List[string]
          foreach ($key in $keys) {
            $value = [Environment]::GetEnvironmentVariable($key)
            if ([string]::IsNullOrWhiteSpace($value)) {
              continue
            }

            # Docker --env-file treats quotes as literal characters.
            $lines.Add("$key=$value")
          }

          Set-Content -Path $outputPath -Value $lines -Encoding utf8
          
      - name: Replace running container
        shell: powershell
        env:
          DOCKER_NETWORK: ${{ secrets.DOCKER_NETWORK || vars.DOCKER_NETWORK }}
        run: |
          $containerName = "task-backend"
          $existing = docker ps -a --filter "name=^$containerName$" --format "{{.Names}}"
          $dockerNetwork = [Environment]::GetEnvironmentVariable("DOCKER_NETWORK")

          if ([string]::IsNullOrWhiteSpace($dockerNetwork)) {
            $dockerNetwork = "infra_app-network"
          }

          $networkExists = docker network ls --format "{{.Name}}" | Where-Object { $_ -eq $dockerNetwork }
          if (-not $networkExists) {
            throw "Docker network '$dockerNetwork' not found. Start your infra stack first (mongodb) or set DOCKER_NETWORK in GitHub vars/secrets."
          }

          if ($existing -and ($existing -split "`r?`n" | Where-Object { $_ -eq $containerName })) {
            docker rm -f $containerName | Out-Null
          }

          $runArgs = @(
            "run",
            "-d",
            "--name", $containerName,
            "--restart", "unless-stopped",
            "-p", "5000:5000",
            "--network", $dockerNetwork,
            "--env-file", "$env:RUNNER_TEMP\.env.development",
            "${{ secrets.DOCKER_USERNAME }}/my-backend:latest"
          )

          docker @runArgs

      - name: Cleanup .env.development file
        if: always()
        shell: powershell
        run: Remove-Item -Force "$env:RUNNER_TEMP\.env.development" -ErrorAction SilentlyContinue

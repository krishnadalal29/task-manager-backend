name: Backend CI to Docker Hub

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  prepare:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-backend:latest

  deploy:
    needs: prepare
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted]  # your local Windows machine
    environment: Development

    steps:
      - name: Pull latest image
        shell: pwsh
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/my-backend:latest

      - name: Create .env.development file
        # shell: pwsh
        uses: jakubcieslik99/secrets-vars-to-env-file-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}
          vars: ${{ toJSON(vars) }}
          generate-file: true
          file-name: .env.development
          file-path: $env:RUNNER_TEMP
          encoding: utf8
          # run: |
          #   $envContent = @"
          #   NODE_ENV=${{ vars.NODE_ENV }}
          #   PORT=${{ vars.PORT }}
          #   API_KEY=${{ secrets.API_KEY }}
          #   DB_HOST=${{ secrets.DB_HOST }}
          #   "@
          #   $envContent | Out-File -FilePath "$env:RUNNER_TEMP\.env.development" -Encoding utf8

      - name: Replace running container
        shell: pwsh
        run: |
          docker rm -f task-backend 2>$null
          docker run -d `
            --name task-backend `
            --restart unless-stopped `
            -p 5000:5000 `
            --env-file "$env:RUNNER_TEMP\.env.development" `
            ${{ secrets.DOCKER_USERNAME }}/my-backend:latest

      - name: Cleanup .env.development file
        if: always()
        shell: pwsh
        run: Remove-Item -Force "$env:RUNNER_TEMP\.env.development" -ErrorAction SilentlyContinue

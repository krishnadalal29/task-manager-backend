name: Backend CI to Docker Hub

on:
  push:
    branches: [ "main" ] # Runs every time you push to main
  pull_request:
    branches: [ "main" ] # Runs tests for Pull Requests, but won't push to Docker Hub

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      # This part only runs on 'push' to main (not on Pull Requests)
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'your-username' with your actual Docker Hub username
          tags: ${{ secrets.DOCKER_USERNAME }}/my-backend:latest
